<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>肝武Helper</title>
    <script type="text/javascript">
      var l = window.location;
      var path = '/' + l.pathname.slice(1);
      var query = l.search ? l.search : '';
      var hash = l.hash ? l.hash : '';
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?redirect=' + encodeURIComponent(path + query + hash)
      );
    </script>
  </head>
  <body>
  </body>
</html>
